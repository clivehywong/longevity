# NeuConn Default Configuration
# The runtime config facade derives most project paths from project_root.

project_root: "~/neuconn_project"

project:
  name: "My BIDS Project"
  description: "Neuroimaging study"

paths:
  project_root: "${project_root}"
  bids_dir: "${project_root}/bids"
  neuconn_app_dir: "${project_root}/neuconn_app"
  derivatives_dir: "${project_root}/derivatives"
  preprocessing_dir: "${derivatives_dir}/preprocessing"
  fmriprep_dir: "${preprocessing_dir}/fmriprep"
  legacy_fmriprep_dir: "${project_root}/fmriprep"
  xcpd_dir: "${preprocessing_dir}/xcpd"
  xcpd_fc_dir: "${xcpd_dir}/fc"
  xcpd_ec_dir: "${xcpd_dir}/ec"
  subject_level_dir: "${derivatives_dir}/subject_level"
  subject_level_fc_dir: "${subject_level_dir}/fc"
  subject_level_ec_dir: "${subject_level_dir}/ec"
  group_level_dir: "${derivatives_dir}/group_level"
  group_level_fc_dir: "${group_level_dir}/fc"
  group_level_ec_dir: "${group_level_dir}/ec"
  qc_dir: "${derivatives_dir}/qc"
  fd_inspection_dir: "${qc_dir}/fd_inspection"
  xcpd_fc_qc_dir: "${qc_dir}/xcpd_fc"
  xcpd_ec_qc_dir: "${qc_dir}/xcpd_ec"
  excluded_dir: "${project_root}/bids_excluded"
  atlases_dir: "${project_root}/atlases"
  atlas_resources_dir: "${project_root}/neuconn_app/resources"
  roi_config_path: "${project_root}/neuconn_app/roi_config.json"
  atlas_label_file: "${atlas_resources_dir}/Schaefer2018_200Parcels_7Networks_order_Tian_Subcortex_S2_label.txt"
  temp_dir: "/tmp/neuconn"
  cache_dir: "~/.cache/neuconn"

hpc:
  enabled: false
  host: "your-hpc-cluster.edu"
  user: "username"
  ssh_key: null

  remote_paths:
    base: "/home/username/project"
    bids: "${base}/bids"
    fmriprep: "${base}/derivatives/preprocessing/fmriprep"
    xcpd_fc: "${base}/derivatives/preprocessing/xcpd/fc"
    xcpd_ec: "${base}/derivatives/preprocessing/xcpd/ec"
    work: "${base}/work"

  singularity_images:
    fmriprep: "/path/to/fmriprep.sif"
    xcp_d: "~/software/xcp_d.sif"
    fmripost_aroma: "/path/to/fmripost-aroma.sif"
    qsiprep: "/path/to/qsiprep.sif"
    qsirecon: "/path/to/qsirecon.sif"
    freesurfer_license: "/path/to/license.txt"

  transfer:
    modalities: ["anat", "fmap", "func"]
    cleanup_after_download: true

  slurm:
    partition: "shared_cpu"
    default_cpus: 8
    default_memory: "32GB"
    default_time: "24:00:00"
    max_concurrent_jobs: 4
    batch_size: 4
    poll_interval: 300

fmriprep:
  version: "25.2.5"
  output_spaces:
    - "MNI152NLin2009cAsym:res-2"
    - "MNI152NLin6Asym:res-2"
    - "T1w"
    - "fsnative"
  flags:
    - "--subject-anatomical-reference unbiased"
    - "--skip-bids-validation"
    - "--ignore slicetiming"
  legacy_symlink: true

xcpd:
  singularity_image_path: "~/software/xcp_d.sif"
  singularity_bind_mounts:
    - "${project_root}"
    - "${bids_dir}"
    - "${derivatives_dir}"
    - "~/software"
  fc:
    mode: "none"
    nuisance_regressors: "36P"
    fd_thresh: 0.5
    min_time: 100
    motion_filter_type: "notch"
    band_stop_min: 12
    band_stop_max: 20
    lower_bpf: 0.01
    upper_bpf: 0.10
    smoothing: 6.0
    atlases: ["LongevitySchaefer200", "Tian"]
    input_type: "fmriprep"
    file_format: "nifti"
    output_type: "censored"
    output_layout: "bids"
    report_output_level: "session"
    output_run_wise_correlations: true
  ec:
    mode: "none"
    nuisance_regressors: "36P"
    fd_thresh: 0.0
    min_time: 0
    motion_filter_type: "notch"
    band_stop_min: 12
    band_stop_max: 20
    lower_bpf: 0.01
    upper_bpf: 0.10
    smoothing: 6.0
    atlases: ["LongevitySchaefer200", "Tian"]
    input_type: "fmriprep"
    file_format: "nifti"
    output_type: "interpolated"
    output_layout: "bids"
    report_output_level: "session"
    output_run_wise_correlations: true

subject_exclusion:
  mean_fd_threshold: 0.5
  min_scan_time: 100

ec_methods:
  pairwise_granger: true
  joint_granger: true
  rdcm: true
  spectral_dcm: true
  full_granger_matrix: false
  granger_lag_order: 1

external_tools:
  julia_executable: "julia"
  matlab_executable: "matlab"
  jgranger_toolbox_root: "/path/to/JGranger_ncvx"
  rdcm_package: "RegressionDynamicCausalModeling"
  sdcm_package: "SpectralDynamicCausalModeling"

roi_config:
  path: "${roi_config_path}"
  label_file: "${atlas_label_file}"
  atlas:
    combined: "Schaefer2018_200Parcels_7Networks_Tian_S2"
    n_cortical: 200
    n_subcortical: 32
    n_total: 232

connectivity:
  local_measures:
    tr: null
    bandpass: [0.01, 0.1]
    smoothing_fwhm: 6
  seed_based:
    atlases:
      - "${atlases_dir}/difumo256_4D.nii"
      - "${atlases_dir}/schaefer400_7net.nii"
    correlation_method: "pearson"

group_analysis:
  statistical_model: "value ~ Group * Time + Age + Sex + MeanFD + (1|Subject)"
  correction_methods:
    - "FDR"
    - "FWE"
    - "uncorrected"
  cluster_threshold: 50
  permutations: 5000
  qc_profiles:
    strict:
      name: "Strict"
      description: "Motion-sensitive analyses"
      fd_threshold: 0.3
      fd_metric: "mean"
      min_volumes: 400
      tsnr_threshold: 40
      exclude_if_missing: true
    moderate:
      name: "Moderate"
      description: "Most analyses"
      fd_threshold: 0.5
      fd_metric: "mean"
      min_volumes: 350
      tsnr_threshold: 30
      exclude_if_missing: false
    lenient:
      name: "Lenient"
      description: "Robust analyses"
      fd_threshold: 0.8
      fd_metric: "mean"
      min_volumes: 300
      tsnr_threshold: 20
      exclude_if_missing: false

study_design:
  group_variable: "Group"
  time_variable: "Time"
  session_pre: "ses-01"
  session_post: "ses-02"
  covariates: ["Age", "Sex"]
  nuisance_regressors: ["MeanFD"]
  primary_contrast: "Group × Time interaction"

metadata:
  group_file: null
  sessions: null
  modalities: null
